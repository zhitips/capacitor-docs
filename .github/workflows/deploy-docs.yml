name: Deploy

on:
  # 手动触发部署
  workflow_dispatch

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 只允许同时运行一次部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 根据配置文件，GitHub Pages 部署时使用这些环境变量
      GITHUB_ACTIONS: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build:production
        env:
          # 设置 GitHub Pages 部署所需的环境变量
          GITHUB_ACTIONS: 'true'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
